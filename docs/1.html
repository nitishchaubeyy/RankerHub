<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Ring Home Button UI</title>
    <style>
        :root {
            --bg-color: #060608;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Container with glassmorphism styling matching the video */
        .ui-container {
            position: relative;
            width: 480px;
            height: 140px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 70px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.7),
                inset 0 1px 0px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            z-index: 1;
        }

        /* WebGL Canvas for the complex 3D shader and lighting effects */
        #canvas-container {
            position: absolute;
            top: -30px;
            left: -10px;
            width: 200px;
            height: 200px;
            pointer-events: none;
            z-index: 2;
        }

        .text-container {
            margin-left: 170px;
            color: #ffffff;
            font-size: 42px;
            font-weight: 500;
            letter-spacing: -0.5px;
            user-select: none;
            opacity: 0.95;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div class="ui-container">
        <div id="canvas-container"></div>
        <div class="text-container">Home</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

        // --- Setup Scene, Camera, Renderer ---
        const container = document.getElementById('canvas-container');
        const width = container.clientWidth;
        const height = container.clientHeight;

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
        camera.position.z = 1;

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(width, height);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // --- Custom Chromatic Aberration Spectrum Ring Shader ---
        // This custom shader mimics the physical dispersion of light around the ring structure
        const RingShaderMaterial = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uResolution: { value: new THREE.Vector2(width, height) }
            },
            transparent: true,
            blending: THREE.AdditiveBlending,
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec2 vUv;
                uniform float uTime;
                
                #define PI 3.14159265359

                // Function to generate the spectral colors
                vec3 spectrum(float w) {
                    vec3 c = vec3(0.0);
                    c.r = smoothstep(0.3, 0.0, abs(w - 0.25)) + smoothstep(0.2, 0.0, abs(w - 0.85));
                    c.g = smoothstep(0.3, 0.0, abs(w - 0.5));
                    c.b = smoothstep(0.3, 0.0, abs(w - 0.75)) + smoothstep(0.2, 0.0, abs(w - 0.15));
                    return c;
                }

                void main() {
                    vec2 uv = vUv - 0.5;
                    float dist = length(uv);
                    
                    // Create Base Ring Mask
                    float radius = 0.33;
                    float thickness = 0.018;
                    float ringMask = smoothstep(thickness, 0.0, abs(dist - radius));
                    
                    if (ringMask <= 0.0) discard;

                    // Dynamic angle calculation for rotating flare intensity
                    float angle = atan(uv.y, uv.x) + PI;
                    
                    // Controlled sweep animations matching the references
                    float sweep1 = sin(angle - uTime * 2.5) * 0.5 + 0.5;
                    float sweep2 = cos(angle * 2.0 + uTime * 1.5) * 0.3 + 0.7;
                    float flare = pow(sweep1 * sweep2, 2.5) * 2.0;

                    // Chromatic dispersion variation along the ring radius
                    float dispersion = (dist - (radius - thickness)) / (thickness * 2.0);
                    
                    // Rotate color space over time slightly for spectrum shifting
                    float colorShift = angle / (2.0 * PI) + uTime * 0.1;
                    vec3 spectralColor = spectrum(mod(dispersion + colorShift, 1.0));

                    // Outer intense hot-spot flares
                    float flareBeam = smoothstep(0.95, 1.0, sin(angle - uTime * 3.5)) * 3.0;
                    
                    // Combine colors and masks
                    vec3 finalColor = spectralColor * (ringMask * 0.4 + flare * 1.5 + flareBeam);
                    
                    // Smooth edges opacity alpha mapping
                    float alpha = smoothstep(0.0, 0.05, ringMask);

                    gl_FragColor = vec4(finalColor, alpha * (length(finalColor)));
                }
            `
        });

        const quadGeo = new THREE.PlaneGeometry(2, 2);
        const ringMesh = new THREE.Mesh(quadGeo, RingShaderMaterial);
        scene.add(ringMesh);

        // --- Create Metallic Home Icon Overlaid Scene ---
        // Using an orthographic projection canvas setup for the 3D extrusion effect
        const iconScene = new THREE.Scene();
        
        // Custom 2D shape pathing out the precise architecture of the Home asset
        const homeShape = new THREE.Shape();
        homeShape.moveTo(0, 0.22);       // Roof Top Point
        homeShape.lineTo(0.24, 0.02);    // Roof Right Eave
        homeShape.lineTo(0.14, 0.02);    // Roof Inner Adjust Right
        homeShape.lineTo(0.14, -0.22);   // Main Body Wall Right
        homeShape.lineTo(0.05, -0.22);    // Foundation Right
        homeShape.lineTo(0.05, -0.07);   // Door Top Right
        homeShape.lineTo(-0.05, -0.07);  // Door Top Left
        homeShape.lineTo(-0.05, -0.22);  // Foundation Left
        homeShape.lineTo(-0.14, -0.22);  // Main Body Wall Left
        homeShape.lineTo(-0.14, 0.02);   // Roof Inner Adjust Left
        homeShape.lineTo(-0.24, 0.02);   // Roof Left Eave
        
        const extrudeSettings = {
            depth: 0.04,
            bevelEnabled: true,
            bevelThickness: 0.015,
            bevelSize: 0.01,
            bevelSegments: 16,
            steps: 1
        };

        const iconGeo = new THREE.ExtrudeGeometry(homeShape, extrudeSettings);
        iconGeo.center();

        // Metallic Material Mimicking Machined Aluminum/Chrome Satin finish
        const iconMat = new THREE.MeshStandardMaterial({
            color: 0xdddddd,
            metalness: 0.95,
            roughness: 0.18,
            envMapIntensity: 2.5
        });

        const iconMesh = new THREE.Mesh(iconGeo, iconMat);
        iconScene.add(iconMesh);

        // Setup studio metallic lighting inside the layered scene
        const dirLight1 = new THREE.DirectionalLight(0xffffff, 4.0);
        dirLight1.position.set(2, 4, 5);
        iconScene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0x90b0ff, 2.0); // Subtle blue rim fill
        dirLight2.position.set(-3, -2, 3);
        iconScene.add(dirLight2);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        iconScene.add(ambientLight);

        // --- Post-Processing Chain (Bloom & Composition) ---
        const renderPass = new RenderPass(scene, camera);
        
        // Hyper-realistic Cinematic Bloom setup configuration
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(width, height), 1.8, 0.4, 0.1);
        bloomPass.threshold = 0.05;
        bloomPass.strength = 1.6;
        bloomPass.radius = 0.65;

        const composer = new EffectComposer(renderer);
        composer.addPass(renderPass);
        composer.addPass(bloomPass);

        // Disable standard auto clearing to blend shader background passes and 3D overlays safely
        renderer.autoClear = false;

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();

            // Feed clock parameters into custom ring shader
            RingShaderMaterial.uniforms.uTime.value = elapsedTime;

            // Generate slow rhythmic light shifting animations across the metal surface mesh
            dirLight1.position.x = Math.sin(elapsedTime * 1.5) * 3 + 2;
            dirLight1.position.y = Math.cos(elapsedTime * 1.1) * 2 + 3;
            
            // Soft responsive rotational wobble to mimic real reflections catching dynamic light
            iconMesh.rotation.y = Math.sin(elapsedTime * 0.8) * 0.05;
            iconMesh.rotation.x = Math.cos(elapsedTime * 0.5) * 0.03;

            // Render execution sequence
            renderer.clear();
            
            // Pass 1: Render dynamic spectral ring with full post-processed bloom tracking
            composer.render();
            
            // Pass 2: Overlap crisp, anti-aliased 3D metal asset without distorting it with the heavy bloom pass
            renderer.render(iconScene, camera);
        }

        animate();

        // Handle high DPI interface window scaling seamlessly
        window.addEventListener('resize', () => {
            const w = container.clientWidth;
            const h = container.clientHeight;
            renderer.setSize(w, h);
            composer.setSize(w, h);
            RingShaderMaterial.uniforms.uResolution.value.set(w, h);
        });
    </script>
</body>
</html>
